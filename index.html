<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Chrono Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;500;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="aurora-bg"></div>
    
    <main class="glass-orb">
        <div class="header-info">
            <span class="chip">CHRONO PRO</span>
            <div id="status" class="status-indicator"></div>
        </div>

        <div class="display-ring-container">
            <svg class="ring-svg" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#00f2fe" />
                        <stop offset="100%" stop-color="#4facfe" />
                    </linearGradient>
                </defs>
                <circle class="ring-track" cx="50" cy="50" r="48"></circle>
                <circle id="progress" class="ring-fill" cx="50" cy="50" r="48"></circle>
            </svg>
            
            <div class="time-readout">
                <div class="digits">
                    <span id="hr">00</span>:<span id="min">00</span>:<span id="sec">00</span>
                </div>
                <div id="ms" class="milliseconds">00</div>
            </div>
        </div>

        <div class="actions">
            <button id="lapBtn" class="btn-secondary" title="Mark Lap">LAP</button>
            <button id="startBtn" class="btn-primary">START</button>
            <button id="resetBtn" class="btn-secondary" title="Reset">RESET</button>
        </div>

        <div class="laps-scroller">
            <ul id="lapsList"></ul>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
