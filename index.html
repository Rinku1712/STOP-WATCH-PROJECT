<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrapper">

  <div class="stopwatch">
    <h2>Stopwatch</h2>

    <div class="time">
      <span id="hours">00</span>:
      <span id="minutes">00</span>:
      <span id="seconds">00</span>.
      <span id="ms">00</span>
    </div>

    <div class="controls">
      <button id="start">Start</button>
      <button id="pause">Lap</button>
      <button id="reset">Reset</button>
    </div>
  </div>

  <!-- Side Lap Panel -->
  <div class="laps-panel">
    <h3>Laps</h3>
    <ul id="laps"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
