<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pro Stopwatch</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="card">

    <h2>Stopwatch</h2>

    <!-- Circle -->
    <div class="circle">
      <svg>
        <circle cx="100" cy="100" r="90"></circle>
        <circle cx="100" cy="100" r="90" id="progress"></circle>
      </svg>

      <div class="time">
        <span id="hours">00</span>:
        <span id="minutes">00</span>:
        <span id="seconds">00</span>.
        <span id="ms">00</span>
      </div>
    </div>

    <!-- Buttons -->
    <div class="controls">
      <button id="start">Start</button>
      <button id="lap">Lap</button>
      <button id="reset">Reset</button>
    </div>

  </div>

  <!-- Laps -->
  <div class="laps">
    <h3>Laps</h3>
    <ul id="laps"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
